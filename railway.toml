# Railway service configuration for the AgentForge OpenEMR fork.
# The MariaDB service is added separately via `railway add --database
# mariadb` (or the dashboard) and exposes its connection details to
# this service through reference variables.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# OpenEMR's first boot runs `setup.php` against the empty database and
# compiles frontend assets. On Railway's smaller builders this can take
# longer than the normal five-minute window, so keep the healthcheck
# intentionally generous.
# The readiness endpoint is served at /meta/health/readyz.
healthcheckPath = "/meta/health/readyz"
healthcheckTimeout = 900
